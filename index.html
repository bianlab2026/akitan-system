<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Calendar Feb-Aug</title>
<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background: #44CAD1;
}

/* タイトル */
h1 {
  text-align: center;
  margin: 8px 0 4px;
  color: #fff;
  font-size: 22px;
  letter-spacing: 1px;
}

/* 固定曜日バー */
.weekday-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  position: sticky;
  top: 0;
  z-index: 20;
  background: #44CAD1;
}

.weekday {
  background: #000;
  color: #fff;
  font-weight: bold;
  font-size: 14px; /* 小さめ */
  text-align: center;
  padding: 4px 0; /* 高さ控えめ */
  border-radius: 4px;
}

/* 月ラベル */
.month-label-container {
  position: sticky;
  top: 26px; /* 曜日バー下 */
  background: #44CAD1;
  z-index: 15;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #fff;
  padding: 2px 0;
}

/* カレンダー本体 */
.month-container {
  margin-bottom: 16px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  width: 100%;
}

.cell {
  background: #fff;
  border-radius: 8px;
  text-align: center;
  position: relative;
  aspect-ratio: 1 / 1.6; /* 縦長 */
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  font-size: 16px;
  padding: 6px 4px;
}

.cell.sat { background: #d3d3d3; }
.cell.sun { background: #d3d3d3; }
.cell.holiday { background: #fff2cc; }

/* today 赤光り */
.today {
  border: 3px solid #ff0000;
  box-shadow: 0 0 16px rgba(255,0,0,0.9);
  transform: scale(1.07);
  z-index: 5;
}

/* 日付・マーク・勤務 */
.date { font-weight: bold; margin-bottom: 4px; font-size: 18px; }
.mark { font-size: 18px; margin-bottom: 2px; }
.work { font-size: 14px; opacity: 0.85; }

/* スタンプ */
.stamp { font-size: 24px; position: absolute; bottom: 4px; right: 4px; }
</style>
</head>
<body>

<h1>🐶2026 Calendar 💉</h1>

<!-- 曜日バー固定 -->
<div class="weekday-row">
  <div class="weekday">Mon</div>
  <div class="weekday">Tue</div>
  <div class="weekday">Wed</div>
  <div class="weekday">Thu</div>
  <div class="weekday">Fri</div>
  <div class="weekday sat">Sat</div>
  <div class="weekday sun">Sun</div>
</div>

<!-- 月ラベル -->
<div class="month-label-container" id="month-label">2月</div>

<!-- カレンダー本体 -->
<div id="calendar"></div>

<script>
const year = 2026;
const calendarDiv = document.getElementById('calendar');
const monthLabelDiv = document.getElementById('month-label');

/* 月データ */
const monthData = {
  2: { days:28, schedule:{1:'日勤',2:'日勤',3:'研修',4:'夜勤入り',5:'休み',6:'休み',7:'日勤',8:'日勤',9:'休み',10:'休み',11:'日勤',12:'夜勤入り',13:'夜勤明け',14:'日勤',15:'日勤',16:'日勤',17:'日勤',18:'日勤',19:'休み',20:'休み',21:'日勤',22:'日勤',23:'夜勤入り',24:'夜勤明け',25:'休み',26:'日勤',27:'休み',28:'日勤'} },
	
	
  3: { days:31, schedule:{1:'日勤',2:'研修',3:'夜勤入り',4:'夜勤明け',5:'休み',6:'日勤',7:'日勤',8:'夜勤入り',9:'夜勤明け',10:'休み',11:'休み',12:'日勤',13:'日勤',14:'休み',15:'休み',16:'日勤',17:'日勤',18:'日勤',19:'休み',20:'休み',21:'休み'} },
  4: { days:30, schedule:{} },
  5: { days:31, schedule:{} },
  6: { days:30, schedule:{} },
  7: { days:31, schedule:{} },
  8: { days:31, schedule:{} }
};

/* スタンプデータ */
const stamps = {
  2:{1:'💚',2:'💚',5:'💙',6:'💙',8:'💚',9:'💚',10:'💚',14:'💖',18:'💚',19:'💚',20:'💚',22:'💚',24:'💚',25:'💚',26:'💚'},
  3:{2:'💚',4:'💚',6:'💙',7:'💙',8:'💙',14:'💖',15:'💖'},
  4:{2:'🚗',4:'💖',5:'💖'},
};

/* 祝日データ（例） */
const holidays = {2:[11,23],3:[20],4:[29],5:[],6:[],7:[20],8:[11]};

/* 勤務マーク判定 */
function judge(day, schedule){
  const today = schedule[day];
  const next = schedule[day+1];
  if(!today) return '';
  if(next==='休み'||next==='研修') return '○';
  if(next==='日勤'||next==='夜勤入り') return '×';
  return '';
}

let firstTodayCell = null;
const monthCells = [];

for(const monthNum in monthData){
  const month = monthData[monthNum];
  const monthContainer = document.createElement('div');
  monthContainer.className='month-container';

  const calendarGrid = document.createElement('div');
  calendarGrid.className='calendar';

  const firstDay = new Date(year, monthNum-1,1).getDay();
  const startDay = (firstDay+6)%7; // 月曜始まり

  for(let i=0;i<startDay;i++){
    const emptyCell = document.createElement('div');
    emptyCell.className='cell';
    calendarGrid.appendChild(emptyCell);
  }

  for(let day=1;day<=month.days;day++){
    const cell = document.createElement('div');
    cell.className='cell';

    const weekdayIndex = (startDay+day-1)%7;
    if(weekdayIndex===5) cell.classList.add('sat');
    if(weekdayIndex===6) cell.classList.add('sun');
    if(holidays[monthNum] && holidays[monthNum].includes(day)) cell.classList.add('holiday');

    const mark = judge(day, month.schedule);
    const work = month.schedule[day] || '';

    const now = new Date();
    const isToday = now.getFullYear()===year && now.getMonth()===(monthNum-1) && now.getDate()===day;
    if(isToday){
      cell.classList.add('today');
      if(!firstTodayCell) firstTodayCell = cell;
    }

    cell.innerHTML=`
      <div class="date">${day}</div>
      <div class="mark ${mark==='○'?'circle':'cross'}">${mark}</div>
      <div class="work">${work}</div>
      ${stamps[monthNum] && stamps[monthNum][day]?`<div class="stamp">${stamps[monthNum][day]}</div>`:''}
    `;

    calendarGrid.appendChild(cell);

    if(day===1) monthCells.push({month: monthNum, cell});
  }

  monthContainer.appendChild(calendarGrid);
  calendarDiv.appendChild(monthContainer);
}

// 月ラベル切替
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      monthLabelDiv.textContent = `${entry.target.dataset.month}月`;
    }
  });
},{root:null, rootMargin:'0px', threshold:0.2});

monthCells.forEach(item=>{
  item.cell.dataset.month = item.month;
  observer.observe(item.cell);
});

// today が中央に来るようスクロール
window.onload = function(){
  if(firstTodayCell){
    const y = firstTodayCell.getBoundingClientRect().top + window.scrollY - window.innerHeight/2 + firstTodayCell.offsetHeight/2;
    window.scrollTo({top:y, behavior:'smooth'});
  }
};
</script>
</body>
</html>
